server {
    listen       80 default_server;
    listen       [::]:80 default_server;
    server_name  _;  # Обслуживает любой хост

    root /data;


   location /api/films/ {
        proxy_pass http://api_movies:8000;
    }

    # WebSocket для FastAPI (чаты/видео)
    location /ws/ {
        proxy_pass http://ws_app:8000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }

    location @backend {
        proxy_pass http://ws_app:8000;
    }

    location ~* \.(?:jpg|jpeg|gif|png|ico|css|js)$ {
        log_not_found off;
        expires 90d;
    }

    location / {
        try_files $uri @backend;
    }


    # Уведомления: внешний путь /notification/* -> внутренний / *
    location /notification/ {
        proxy_pass http://notification:8000/;
    }

    # UGC: внешний путь /ugc/* -> /api/v1/* внутри ugc_service
    location /ugc/ {
        proxy_pass http://ugc:8000/;
    }

    # Авторизация: внешний путь /auth/* прокидываем как есть
    location /auth/ {
        proxy_pass http://auth_service:8000;
    }

    location /static/ {
        alias /data/static/;
    }

    error_page  404              /404.html;

    # redirect server error pages to the static page /50x.html
    #
    error_page   500 502 503 504  /50x.html;
    location = /50x.html {
        root   html;
    }
}