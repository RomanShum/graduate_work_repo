version: '3.9'

services:
  admin_panel:
    container_name: admin_panel
    build: ./admin_panel/
    expose:
      - "8000"
    depends_on:
      - cinema_db
    env_file:
      - ./.env
    networks:
      - app_network
    volumes:
      - static:/opt/app/static
      - media:/opt/app/media
      - ./admin_panel:/opt/app

  nginx:
    image: nginx:latest
    container_name: nginx
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./configs:/etc/nginx/conf.d:ro
      - static:/data/static
      - media:/data/media
    depends_on:
      - admin_panel
      - api
    ports:
      - "80:80"
    networks:
      - app_network

  cinema_db:
    image: postgres:latest
    container_name: cinema_db
    env_file:
      - ./.env
    expose:
      - "5432"
    ports:
      - "5432:5432"
    volumes:
      - ./admin_panel/database_dump.sql:/docker-entrypoint-initdb.d/init.sql
      - postgres_data:/var/lib/postgresql
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${POSTGRES_USER}" ]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - app_network

  elasticsearch:
    image: elasticsearch:9.1.5
    container_name: elastic
    restart: always
    expose:
      - "9200"
    ports:
      - "9200:9200"
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
    volumes:
      - elasticsearch_data:/usr/share/elasticsearch/data
    healthcheck:
      test: [ "CMD-SHELL", "curl -f http://localhost:9200/_cluster/health || exit 1" ]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - app_network

  init-elastic:
    image: curlimages/curl:latest
    container_name: elastic_init
    depends_on:
      elasticsearch:
        condition: service_healthy
    volumes:
      - ./etl_service/init-elastic.sh:/scripts/init-elastic.sh
    command: > 
      sh -c "chmod +x /scripts/*.sh && /scripts/init-elastic.sh"
    env_file:
      - ./.env
    networks:
      - app_network

  etl:
    build: ./etl_service
    container_name: etl
    restart: always
    depends_on:
      cinema_db:
        condition: service_healthy
      elasticsearch:
        condition: service_healthy
      init-elastic:
        condition: service_completed_successfully
    env_file:
      - ./.env
    networks:
      - app_network
  redis:
    image: redis:8.2-alpine
    container_name: redis
    restart: always
    expose:
      - "6379"
    volumes:
      - redis_data:/redis_data
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - app_network
  api:
    build: ./async_api
    container_name: api
    restart: always
    volumes:
      - ./async_api:/app/
    depends_on:
      elasticsearch:
        condition: service_healthy
      redis:
        condition: service_healthy
    env_file:
      - ./.env
    networks:
      - app_network
  auth_service:
    build: ./auth_service
    container_name: auth_service
    restart: always
    volumes:
      - ./auth_service:/app/
    depends_on:
      - cinema_db
      - redis
    env_file:
      - ./.env
    networks:
      - app_network

  ugc:
    build: ./ugc_service
    container_name: ugc
    volumes:
      - ./ugc_service:/opt/app
    networks:
      - app_network

  mongodb:
    image: mongo
    container_name: mongodb
    ports:
      - "27017:27017"
    restart: unless-stopped
    environment:
      MONGO_INITDB_DATABASE: content
    volumes:
      - mongo_db:/data/db
    networks:
      - app_network

  kibana:
    image: kibana:9.1.5
    container_name: kibana
    ports:
      - "5601:5601"
    depends_on:
      - elasticsearch
    volumes:
      - kibana_data:/usr/share/kibana/data
    networks:
      - app_network
    environment:
      - ELASTICSEARCH_HOSTS=http://elastic:9200

  logstash:
    image: logstash:8.10.2
    container_name: logstash
    depends_on:
      - elasticsearch
    environment:
      XPACK_MONITORING_ENABLED: "false"
      ES_HOST: "elasticsearch:9200"
    ports:
      - "5044:5044"
      - "5045:5045"
    networks:
      - app_network
    volumes:
      - ./ugc_service/logstash.conf:/config/logstash.conf:ro
    command: logstash -f /config/logstash.conf

networks:
  app_network:
    driver: bridge

volumes:
  static:
  media:
  postgres_data:
  elasticsearch_data:
  redis_data:
  mongo_db:
  kibana_data: