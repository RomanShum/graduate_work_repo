version: '3.9'

services:
  admin_panel:
    container_name: admin_panel
    build: ./admin_panel/
    expose:
      - "8000"
    depends_on:
      - cinema_db
    env_file:
      - ./.env
    networks:
      - app_network
    volumes:
      - static:/opt/app/static
      - media:/opt/app/media
      - ./admin_panel:/opt/app

  nginx:
    image: nginx:latest
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./configs:/etc/nginx/conf.d:ro
      - static:/data/static
      - media:/data/media
    depends_on:
      - admin_panel
    ports:
      - "80:80"
    networks:
      - app_network

  cinema_db:
    image: postgres:latest
    container_name: cinema_db
    env_file:
      - ./.env
    expose:
      - "5432"
    ports:
      - "5432:5432"
    volumes:
      - ./admin_panel/database_dump.sql:/docker-entrypoint-initdb.d/init.sql
      - postgres_data:/var/lib/postgresql
    networks:
      - app_network

networks:
  app_network:
    driver: bridge

volumes:
  static:
  media:
  postgres_data: