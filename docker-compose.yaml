version: '3.9'

services:
  nginx:
    image: nginx:latest
    container_name: nginx
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./configs:/etc/nginx/conf.d:ro
      - static:/data/static
      - media:/data/media
    depends_on:
      - ws_app
    ports:
      - "80:80"
    networks:
      - app_network

  cinema_db:
    image: postgres:latest
    container_name: cinema_db
    env_file:
      - ./.env
    expose:
      - "5432"
    ports:
      - "5432:5432"
    volumes:
      - ./configs/database_dump.sql:/docker-entrypoint-initdb.d/init.sql
      - postgres_data:/var/lib/postgresql
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${POSTGRES_USER}" ]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - app_network
  redis:
    image: redis:8.2-alpine
    container_name: redis
    restart: always
    expose:
      - "6379"
    volumes:
      - redis_data:/redis_data
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - app_network
  auth_service:
    build: ./auth_service
    container_name: auth_service
    restart: always
    volumes:
      - ./auth_service:/app/
    depends_on:
      - cinema_db
      - redis
    env_file:
      - ./.env
    networks:
      - app_network

  ugc:
    build: ./ugc_service
    container_name: ugc
    env_file:
      - ./.env
    volumes:
      - ./ugc_service:/opt/app
    networks:
      - app_network

  mongodb:
    image: mongo
    container_name: mongodb
    ports:
      - "27017:27017"
    restart: unless-stopped
    environment:
      MONGO_INITDB_DATABASE: content
    volumes:
      - mongo_db:/data/db
    networks:
      - app_network

  kafka:
    image: apache/kafka:4.1.1
    container_name: kafka
    restart: always
    expose:
      - "9094"
    environment:
      - KAFKA_ENABLE_KRAFT=yes
      - KAFKA_PROCESS_ROLES=broker,controller
      - KAFKA_NODE_ID=0
      - KAFKA_KRAFT_CLUSTER_ID=abcdefghijklmnopqrstuv
      - KAFKA_CONTROLLER_QUORUM_VOTERS=0@kafka:9093
      - KAFKA_CONTROLLER_LISTENER_NAMES=CONTROLLER
      - KAFKA_LISTENERS=PLAINTEXT://:9092,CONTROLLER://:9093,EXTERNAL://:9094
      - KAFKA_LISTENER_SECURITY_PROTOCOL_MAP=PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT,EXTERNAL:PLAINTEXT
      - KAFKA_ADVERTISED_LISTENERS=PLAINTEXT://kafka:9092,EXTERNAL://kafka:9094
      - KAFKA_INTER_BROKER_LISTENER_NAME=PLAINTEXT
      - KAFKA_AUTO_CREATE_TOPICS_ENABLE=true
      - KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR=1
      - KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR=1
      - KAFKA_TRANSACTION_STATE_LOG_MIN_ISR=1
    networks:
      - app_network
    healthcheck:
      test: [ "CMD", "nc", "-z", "localhost", "9092" ]
      interval: 10s
      timeout: 5s
      retries: 10

    volumes:
      - kafka_0_data:/bitnami/kafka

  notification:
    build: ./notification_service/src
    container_name: notification
    env_file:
      - ./.env
    volumes:
      - ./notification_service/src:/opt/app
    depends_on:
      - mongodb
    networks:
      - app_network
  worker:
    build: ./notification_service/worker
    container_name: worker
    restart: always
    env_file:
      - ./.env
    volumes:
      - ./notification_service/worker:/opt/app
    depends_on:
      kafka:
        condition: service_healthy
    networks:
      - app_network
  ws_app:
    build: ./src
    container_name: ws_app
    ports:
      - "8000:8000"
    env_file:
      - ./.env
    volumes:
      - static:/opt/app/static
      - ./src:/opt/app
    depends_on:
      - cinema_db
    networks:
      - app_network
  api_movies:
    build: ./api_movies
    container_name: api_movies
    env_file:
      - ./.env
    volumes:
      - ./api_movies:/opt/app
    depends_on:
      - cinema_db
    networks:
      - app_network
  mailhog:
    image: mailhog/mailhog
    container_name: mailhog
    ports:
      - "8025:8025"
      - "1025:1025"
    networks:
      - app_network

networks:
  app_network:
    driver: bridge

volumes:
  static:
  media:
  postgres_data:
  redis_data:
  mongo_db:
  kafka_0_data: